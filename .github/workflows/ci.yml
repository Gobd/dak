name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  node:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # GITHUB_TOKEN authenticates the shellcheck npm package's binary download
        # (from GitHub Releases) so CI doesn't hit the anonymous 60-req/hr rate
        # limit. This is the job-scoped token Actions auto-issues — it expires
        # when the job ends and is read-only on public API by default.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Check all apps
        run: pnpm check
